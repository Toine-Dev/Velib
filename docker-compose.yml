services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ml_user
      POSTGRES_PASSWORD: ml_password
      POSTGRES_DB: ml_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  bootstrap_velib_csv:
    build: .
    depends_on:
      - db
    volumes:
      - .:/app
    environment:
      TABLE_NAME: velib_raw
      DATABASE_URL: postgresql://ml_user:ml_password@db:5432/ml_db
      CSV_URL: https://opendata.paris.fr/api/explore/v2.1/catalog/datasets/comptage-velo-donnees-compteurs/exports/csv?lang=fr&timezone=Europe%2FParis&use_labels=true&delimiter=%3B
      PYTHONPATH: /app/src
      PYTHONUNBUFFERED: "1"
    command: python scripts/bootstrap_velib_csv.py
    restart: "no"

  update_api:
    build: .
    depends_on:
      - db
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://ml_user:ml_password@db:5432/ml_db
      PYTHONPATH: /app/src
      PYTHONUNBUFFERED: "1"
      VELIB_API_URL: https://opendata.paris.fr/api/explore/v2.1/catalog/datasets/comptage-velo-donnees-compteurs/records
      HISTORICAL_WEATHER_API_URL: https://archive-api.open-meteo.com/v1/archive
      FORECAST_WEATHER_API_URL: https://api.open-meteo.com/v1/forecast
    command: python scripts/update_data.py
    restart: "no"

  preprocess_data:
    build: .
    depends_on:
      - db
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://ml_user:ml_password@db:5432/ml_db
      PYTHONPATH: /app/src
      PYTHONUNBUFFERED: "1"
    command: python scripts/preprocess_data.py
    restart: "no"

  train_model:
    build: .
    depends_on:
      - db
      - mlflow
    volumes:
      - .:/app
      - mlflow_artifacts:/mlflow/artifacts
    environment:
      DATABASE_URL: postgresql://ml_user:ml_password@db:5432/ml_db
      MODEL_POINTER_DB_URL: postgresql://ml_user:ml_password@db:5432/mlflow_db
      PYTHONPATH: /app/src
      PYTHONUNBUFFERED: "1"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: velib_forecast
    command: python scripts/train_model.py
    restart: "no"

  mlflow:
    build: .
    depends_on:
      - db
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://ml_user:ml_password@db:5432/mlflow_db
      --default-artifact-root file:/mlflow/artifacts
      --serve-artifacts
      --artifacts-destination /mlflow/artifacts

  recursive_forecast:
    build: .
    depends_on:
      - db
      - mlflow
    environment:
      DATABASE_URL: postgresql://ml_user:ml_password@db:5432/ml_db
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: velib_forecast
      FORECAST_HOURS: "48"
      HISTORY_WINDOW_DAYS: "30"
      PYTHONUNBUFFERED: "1"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: python scripts/recursive_forecast.py
    restart: "no"

  streamlit_app:
    build: .
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql://ml_user:ml_password@db:5432/ml_db
      API_BASE_URL: http://api:8000
      STREAMLIT_API_USER: admin
      STREAMLIT_API_PASS: admin
      PYTHONPATH: /app/src
    command: streamlit run scripts/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - .:/app

  api:
    build: .
    depends_on:
      - db
      - mlflow
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ml_user:ml_password@db:5432/ml_db
      JWT_SECRET: "change-me-in-env"
      MLFLOW_UI_URL: "http://localhost:5000"
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
      MLFLOW_EXPERIMENT_NAME: "velib_forecast"
      API_ADMIN_USER: "admin"
      API_ADMIN_PASS: "admin"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - mlflow_artifacts:/mlflow/artifacts  

volumes:
  postgres_data:
  mlflow_artifacts:
